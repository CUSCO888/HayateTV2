apply plugin: 'com.android.application'

android {
    namespace = "com.hayatetv.app"
    compileSdk = project.hasProperty('compileSdkVersion') ? project.compileSdkVersion : 34
    defaultConfig {
        applicationId "com.hayatetv.app"
        minSdkVersion project.hasProperty('minSdkVersion') ? project.minSdkVersion : 22
        targetSdkVersion project.hasProperty('targetSdkVersion') ? project.targetSdkVersion : 34
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
            // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
            // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    configurations.all {
        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:${project.hasProperty('androidxAppCompatVersion') ? project.androidxAppCompatVersion : '1.6.1'}"
    implementation "androidx.coordinatorlayout:coordinatorlayout:${project.hasProperty('androidxCoordinatorLayoutVersion') ? project.androidxCoordinatorLayoutVersion : '1.2.0'}"
    implementation "androidx.core:core-splashscreen:${project.hasProperty('coreSplashScreenVersion') ? project.coreSplashScreenVersion : '1.0.1'}"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:${project.hasProperty('junitVersion') ? project.junitVersion : '4.13.2'}"
    androidTestImplementation "androidx.test.ext:junit:${project.hasProperty('androidxJunitVersion') ? project.androidxJunitVersion : '1.1.5'}"
    androidTestImplementation "androidx.test.espresso:espresso-core:${project.hasProperty('androidxEspressoCoreVersion') ? project.androidxEspressoCoreVersion : '3.5.1'}"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
