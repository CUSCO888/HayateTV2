name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          npm install -D @capacitor/assets @capacitor/cli

      - name: Build Web App
        run: npm run build

      - name: Initialize & Fix Android Project
        run: |
          # 1. 重新创建 Android 工程
          if [ -d "android" ]; then rm -rf android; fi
          npx cap add android

          # 2. 生成图标资源
          if [ -f "assets/icon.png" ]; then
            # 去掉 --icon-only，改用标准的生成命令
            npx capacitor-assets generate --android
            
            # 补丁：这是解决“Resource not found”报错的关键！
            # 强行删除导致 AAPT 链接失败的自适应图标配置文件
            rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
            rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
            
            # 额外补充：确保背景和前景资源文件夹即便不存在也不会让编译器卡死
            echo "Icon generation completed and adaptive XMLs removed."
          else
            echo "::warning::未找到 assets/icon.png"
          fi
          
          # 3. 动态修复 Kotlin 冲突
          sed -i 's/kotlin_version = .*/kotlin_version = "1.9.20"/' android/build.gradle
          echo "configurations.all { resolutionStrategy.eachDependency { details -> if (details.requested.group == 'org.jetbrains.kotlin' && details.requested.name.contains('kotlin-stdlib-jdk')) { details.useTarget(\"org.jetbrains.kotlin:kotlin-stdlib:\${details.requested.version}\") } } }" >> android/app/build.gradle
          
          # 4. 同步 Web 资源
          npx cap sync android

      - name: Make Gradlew Executable
        run: chmod +x android/gradlew

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hayatetv-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
