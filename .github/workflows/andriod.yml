name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          npm install -D @capacitor/assets @capacitor/cli

      - name: Build Web App
        run: npm run build

      - name: Initialize & Fix Android Project
        run: |
          # 1. 重新创建 Android 工程
          if [ -d "android" ]; then rm -rf android; fi
          npx cap add android

          # 2. 优化图标生成逻辑
          if [ -f "assets/icon.png" ]; then
            # 增加 --icon-only 参数，防止它去寻找不存在的 background/foreground
            npx capacitor-assets generate --android --icon-only
            
            # 补丁：删除可能导致报错的 XML 引用
            rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
            rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          else
            echo "::warning::未找到 assets/icon.png"
          fi
          
          # 3. 动态修复 Kotlin 冲突
          sed -i 's/kotlin_version = .*/kotlin_version = "1.9.20"/' android/build.gradle
          echo "configurations.all { resolutionStrategy.eachDependency { details -> if (details.requested.group == 'org.jetbrains.kotlin' && details.requested.name.contains('kotlin-stdlib-jdk')) { details.useTarget(\"org.jetbrains.kotlin:kotlin-stdlib:\${details.requested.version}\") } } }" >> android/app/build.gradle
          
          # 4. 同 Web 资源并同步 Capacitor
          npx cap sync android

      - name: Make Gradlew Executable
        run: chmod +x android/gradlew

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hayatetv-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
