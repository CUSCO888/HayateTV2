name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: |
        npm install
        # 强制安装 Capacitor 核心和图标生成工具
        npm install @capacitor/core @capacitor/android
        npm install -D @capacitor/cli @capacitor/assets

    - name: Build Web App
      run: |
        # 这一步非常关键：必须先生成 dist 文件夹
        npm run build

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Initialize & Sync Capacitor
      run: |
        # 1. 如果没有 android 目录则添加
        if [ ! -d "android" ]; then
          npx cap add android
        fi

        # 2. 自动生成图标 (前提：你根目录下需要有一个 assets/icon.png)
        if [ -f "assets/icon.png" ]; then
          npx capacitor-assets generate --android
        fi
        
        # 3. 动态修复 Kotlin 冲突 (Duplicate class)
        sed -i 's/kotlin_version = .*/kotlin_version = "1.9.20"/' android/build.gradle
        echo "configurations.all { resolutionStrategy.eachDependency { details -> if (details.requested.group == 'org.jetbrains.kotlin' && details.requested.name.contains('kotlin-stdlib-jdk')) { details.useTarget(\"org.jetbrains.kotlin:kotlin-stdlib:\${details.requested.version}\") } } }" >> android/app/build.gradle
        
        # 4. 关键：将最新的构建产物同步到 Android 工程
        npx cap sync android

    - name: Build Debug APK
      working-directory: ./android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Rename and Prepare APK
      run: |
        if [ -f "android/app/build/outputs/apk/debug/app-debug.apk" ]; then
          mv android/app/build/outputs/apk/debug/app-debug.apk ./hayatetv.apk
        else
          echo "Error: APK not found"
          exit 1
        fi

    - name: Upload HayateTV APK
      uses: actions/upload-artifact@v4
      with:
        name: HayateTV_Installation_Package
        path: hayatetv.apk
        if-no-files-found: error
