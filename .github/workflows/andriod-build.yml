name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: |
        # 1. 安装 package.json 中的原始依赖
        npm install
        # 2. 强制补齐缺少的 Capacitor 核心组件
        npm install @capacitor/core @capacitor/android
        npm install -D @capacitor/cli

    - name: Build Web App
      run: |
        # 构建前端产物 (生成 dist 文件夹)
        npm run build

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Initialize Capacitor & Android Platform
      run: |
        # 1. 确保安装了最新 CLI
        npm install -D @capacitor/cli @capacitor/android
        
        # 2. 如果目录不存在则添加
        if [ ! -d "android" ]; then
          npx cap add android
        fi

        # 3. 动态修复 Kotlin 冲突 (针对新版 Capacitor 6+)
        # 这行脚本会自动在 android/build.gradle 中强制统一 Kotlin 版本
        sed -i 's/kotlin_version = .*/kotlin_version = "1.9.20"/' android/build.gradle
        
        # 4. 动态在 app/build.gradle 中加入强制策略
        echo "configurations.all { resolutionStrategy.eachDependency { details -> if (details.requested.group == 'org.jetbrains.kotlin' && details.requested.name.contains('kotlin-stdlib-jdk')) { details.useTarget(\"org.jetbrains.kotlin:kotlin-stdlib:\${details.requested.version}\") } } }" >> android/app/build.gradle

        # 5. 最后同步并构建
        npx cap sync android

    - name: Build Debug APK
      working-directory: ./android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug

    # --- 新增：探测所有生成的 APK 路径 ---
    - name: List all files to find APK
      run: |
        echo "Searching for APK files..."
        find . -name "*.apk"
        echo "Current directory structure for outputs:"
        ls -R android/app/build/outputs/ || echo "Outputs directory not found"

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        # 尝试使用根目录起始的通配符
        path: "**/*.apk" 
        if-no-files-found: error
