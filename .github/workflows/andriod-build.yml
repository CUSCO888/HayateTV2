name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: |
        npm install
        # 核心依赖：Capacitor CLI 和图标生成工具
        npm install @capacitor/core @capacitor/android
        npm install -D @capacitor/cli @capacitor/assets

    - name: Build Web App
      run: |
        # 必须先生成 dist 文件夹，确保 vite.config.ts 已设置 base: './'
        npm run build

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21' # 匹配最新的 Capacitor 6 编译要求

    - name: Initialize & Fix Android Project
      run: |
        # 1. 如果已有 android 目录则删除重建，确保图标和配置是最新的
        if [ -d "android" ]; then
          rm -rf android
        fi
        npx cap add android

        # 2. 强制生成图标资源
        # 请确保你的仓库根目录下有 assets/icon.png (1024x1024)
        if [ -f "assets/icon.png" ]; then
          npx capacitor-assets generate --android
        else
          echo "::warning::未找到 assets/icon.png，将使用默认机器人图标"
        fi
        
        # 3. 动态修复 Kotlin 冲突 (Duplicate class)
        sed -i 's/kotlin_version = .*/kotlin_version = "1.9.20"/' android/build.gradle
        echo "configurations.all { resolutionStrategy.eachDependency { details -> if (details.requested.group == 'org.jetbrains.kotlin' && details.requested.name.contains('kotlin-stdlib-jdk')) { details.useTarget(\"org.jetbrains.kotlin:kotlin-stdlib:\${details.requested.version}\") } } }" >> android/app/build.gradle
        
        # 4. 同步 Web 资源到安卓工程
        npx cap sync android

    - name: Build Debug APK
      working-directory: ./android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Rename and Prepare APK
      run: |
        if [ -f "android/app/build/outputs/apk/debug/app-debug.apk" ]; then
          mv android/app/build/outputs/apk/debug/app-debug.apk ./hayatetv.apk
        else
          echo "::error::未找到 APK 文件，请检查 Gradle 编译日志"
          exit 1
        fi

    - name: Upload HayateTV APK
      uses: actions/upload-artifact@v4
      with:
        name: HayateTV_Installation_Package
        path: hayatetv.apk
        if-no-files-found: error
